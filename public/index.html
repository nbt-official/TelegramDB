<!DOCTYPE html>
<html>
<head>
    <title>Free Unlimited Cloud</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .box { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="box">
        <h2>Upload to Telegram Cloud</h2>
        <input type="file" id="fileInput"><br><br>
        <button onclick="uploadFile()">Upload Now</button>
        <p id="status"></p>
    </div>

    <script>
function uploadFile() {
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const file = fileInput.files[0];

    if (!file) return alert("File ekak thoranna!");

    const formData = new FormData();
    formData.append('file', file);

    const xhr = new XMLHttpRequest();

    // Progress eka calculate karana hati
    xhr.upload.onprogress = function(event) {
        if (event.lengthComputable) {
            const uploadedMB = (event.loaded / (1024 * 1024)).toFixed(2);
            const totalMB = (event.total / (1024 * 1024)).toFixed(2);
            const percent = Math.round((event.loaded / event.total) * 100);
            
            status.innerHTML = `Uploading: ${percent}% (${uploadedMB} MB / ${totalMB} MB)`;
        }
    };

    xhr.onload = function() {
        if (xhr.status === 200) {
            const data = JSON.parse(xhr.responseText);
            const downloadLink = `${window.location.origin}/download/${data.telegram_file_id}`;
            status.innerHTML = `✅ Upload Success! <br> Link: <input type="text" value="${downloadLink}" readonly>`;
        } else {
            status.innerHTML = "❌ Upload failed!";
        }
    };

    xhr.open('POST', '/upload', true);
    xhr.send(formData);
}
    </script>
</body>
</html>
